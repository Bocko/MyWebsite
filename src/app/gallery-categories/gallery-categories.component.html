<div class="container-fluid col-lg-5 content-background">
  @for (category of categories; track category) {
    <div class="categoryItem" [routerLink]="['/gallery/',category.name]">
      <span class="categoryName">{{category.name}}</span>
      <span class="photoCount">{{category.count}} Photos</span>
    </div>
  }
</div>
